<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchShare | 見たい作品リスト共有</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231f2430'/%3E%3Cpath d='M18 16h8v32h-8zM30 16h8v32h-8zM42 16h8v32h-8z' fill='%23ffffff'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="container">
    <header class="hero">
      <p class="badge">Movie & Drama Watchlist</p>
      <h1>WatchShare</h1>
      <p class="hero-copy">映画・ドラマの「見たい」をまとめて、URLでかんたん共有。</p>
      <p id="room-label" class="room-label"></p>
    </header>

    <section class="panel form-panel">
      <h2>作品を追加</h2>
      <form id="add-form" class="add-form">
        <label>
          タイトル
          <input id="title" name="title" list="title-suggestions" required maxlength="120" placeholder="例: Dune: Part Two" autocomplete="off" />
          <datalist id="title-suggestions"></datalist>
        </label>

        <label>
          種別
          <select id="type" name="type">
            <option value="洋画">洋画</option>
            <option value="邦画">邦画</option>
            <option value="国内ドラマ">国内ドラマ</option>
            <option value="海外ドラマ">海外ドラマ</option>
          </select>
        </label>

        <label>
          メモ
          <input id="note" name="note" maxlength="160" placeholder="例: 週末にみたい" />
        </label>

        <button type="submit">リストに追加</button>
      </form>
    </section>

    <section class="panel controls-panel">
      <div class="search-wrap">
        <input id="search" placeholder="タイトル/メモで検索" />
      </div>
      <div class="control-buttons">
        <button id="share-btn" class="secondary">共有URLを作る</button>
        <button id="clear-btn" class="danger">すべて削除</button>
      </div>
      <p id="share-message" class="share-message" aria-live="polite"></p>
      <p id="stats-message" class="stats-message"></p>
    </section>

    <section class="panel list-panel">
      <h2>見たいリスト</h2>
      <ul id="todo-list" class="watchlist"></ul>
      <p id="todo-empty" class="empty-state">まだ見たい作品がありません。</p>
    </section>

    <section class="panel list-panel">
      <h2>視聴済みリスト</h2>
      <ul id="watched-list" class="watchlist"></ul>
      <p id="watched-empty" class="empty-state">まだ視聴済み作品はありません。</p>
    </section>
  </main>

  <div id="trailer-modal" class="trailer-modal hidden" aria-hidden="true">
    <div class="trailer-dialog" role="dialog" aria-modal="true" aria-labelledby="trailer-title">
      <div class="trailer-head">
        <h2 id="trailer-title">予告編</h2>
        <button id="trailer-close" class="trailer-close" type="button">閉じる</button>
      </div>
      <div class="trailer-body">
        <p id="trailer-status" class="trailer-status">読み込み中...</p>
        <iframe
          id="trailer-frame"
          class="trailer-frame hidden"
          title="予告編プレイヤー"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </div>

  <template id="item-template">
    <li class="item">
      <div class="poster-wrap">
        <img class="poster" alt="" loading="lazy" />
      </div>
      <div class="item-main">
        <div class="meta">
          <div class="title-row">
            <h3></h3>
            <select class="type-select" name="item-type" aria-label="種別を変更"></select>
          </div>
          <p class="summary"></p>
          <p class="note"></p>
        </div>
      </div>
      <div class="item-actions">
        <button class="toggle-btn"></button>
        <button class="delete-btn">削除</button>
      </div>
    </li>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./script.js"></script>
</body>
</html>
